# Render Blueprint for Kast CMS
# Deploy button: https://render.com/deploy?repo=https://github.com/kast-cms/kast
#
# Provisions: API (web service), Admin (web service), Postgres, Redis.
# After deploy, set JWT_SECRET and CORS_ORIGINS in the Render dashboard.

services:
  # ── API ───────────────────────────────────────────────────────────────────
  - type: web
    name: kast-api
    runtime: docker
    dockerfilePath: apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '3000'
      - key: DATABASE_URL
        fromDatabase:
          name: kast-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: kast-redis
          type: redis
          property: connectionString
      # Required — set in Render dashboard after deploy
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: '*'
      - key: STORAGE_PROVIDER
        value: local
      - key: STORAGE_LOCAL_DIR
        value: /tmp/kast-uploads
      - key: STORAGE_LOCAL_URL
        value: https://kast-api.onrender.com/uploads

  # ── Admin ─────────────────────────────────────────────────────────────────
  - type: web
    name: kast-admin
    runtime: docker
    dockerfilePath: apps/admin/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /admin
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: '3001'
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: kast-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  # ── Redis ─────────────────────────────────────────────────────────────────
  - type: redis
    name: kast-redis
    plan: free
    ipAllowList: []

databases:
  # ── Postgres ──────────────────────────────────────────────────────────────
  - name: kast-postgres
    plan: free
    databaseName: kast_db
    user: kast
