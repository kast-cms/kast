name: Publish

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Build CLI e2e smoke test ───────────────────────────────────────────────
  cli-e2e:
    name: CLI e2e
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build CLI
        run: pnpm --filter create-kast-app build

      - name: Run CLI e2e tests
        run: pnpm --filter create-kast-app test:e2e

  # ── Publish NPM packages ───────────────────────────────────────────────────
  publish-npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    needs: cli-e2e
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write # for npm provenance

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @kast/api exec prisma generate

      - name: Build packages
        run: pnpm --filter create-kast-app --filter @kast/sdk build

      - name: Publish create-kast-app
        run: pnpm --filter create-kast-app publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @kast/sdk
        run: pnpm --filter @kast/sdk publish --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Build & push Docker images ─────────────────────────────────────────────
  publish-docker:
    name: Docker — ${{ matrix.app }}
    runs-on: ubuntu-latest
    needs: cli-e2e
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - app: api
            context: apps/api
            image: kasthq/api
          - app: admin
            context: .
            image: kasthq/admin
            dockerfile: apps/admin/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Extract version tag
        id: tag
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.app }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile || format('{0}/Dockerfile', matrix.context) }}
          push: true
          tags: |
            ${{ matrix.image }}:latest
            ${{ matrix.image }}:${{ steps.tag.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Create GitHub Release ──────────────────────────────────────────────────
  gh-release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-npm, publish-docker]
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
